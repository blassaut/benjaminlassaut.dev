<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="c12-title">
  <title id="c12-title">BL Logo - Hex Inline Compact</title>
  <defs>
    <linearGradient id="c12-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6" />
      <stop offset="100%" style="stop-color:#0d9488" />
    </linearGradient>
    <linearGradient id="c12-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.02" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#0a0a0f"/>
  <!-- Hexagon -->
  <polygon points="100,14 180,54 180,146 100,186 20,146 20,54" fill="url(#c12-bg)" stroke="url(#c12-grad)" stroke-width="2.5"/>
  <!-- BL side by side, large and bold - fallback for small sizes -->
  <text x="100" y="126" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="80" letter-spacing="-4" fill="url(#c12-grad)">BL</text>
</svg>